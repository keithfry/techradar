# This repo's AI/Robotics digest config — runs against the news-radar package.
#
# output_root is this repo's own techradar/ — tracked in git, published as this
# repo's GitHub Pages site (https://keithfry.github.io/techradar). It was
# seeded once from web-pages/techradar's existing content. output_root IS the
# Pages docroot, so no public_path_prefix is needed. feeds_csv still reads
# from the sibling web-pages checkout (read-only, safe).
#
# Consumed by run.py via `newsradar.cli.main()`. Secrets (GMAIL_CLIENT_ID/SECRET,
# ANTHROPIC_API_KEY) are NOT here — they load from ~/keys/kfopenclaw-gmail.env
# via run.py.

[site]
title = "AI + Robotics Techradar"
base_url = "https://keithfry.github.io/techradar"
author_name = "Keith Fry"
author_email = "keithfry@gmail.com"

[models]
summarize_model = "ollama/llama3.2:3b"
rank_model = "ollama/qwen3.5:9b"
dedup_model = "anthropic/claude-haiku-4-5"
ad_detector_model = "ollama/ad-detector"
ad_gate_enabled = true

[pipeline]
lookback_hours = 24
llm_workers = 2
url_workers = 10
article_body_char_cap = 20000
tts_workers = 2
arxiv_max_papers = 10

[gmail]
# Lives in this repo, gitignored — same OAuth token carried over from the
# web-pages-nested location, no re-authentication needed.
token_path = "../token.json"

[paths]
# This config file lives in config/. output_root is this repo's own local
# copy of web-pages/techradar (testing — see note above). feeds_csv is a
# local copy in config/ (source of truth remains web-pages/data/).
output_root = "../techradar"
feeds_csv = "ai-rss-feeds.csv"

[publish]
hook = "hooks.publish:publish_hook"

# --- Topics -----------------------------------------------------------------

[[topics]]
name = "ai"
display_name = "AI"
feed_category = "AI"
output_dir = "AI"
file_prefix = "ai-radar"
fail_open = true

keywords = [
    "ai", "ml", "llm", "robot", "neural", "machine learning",
    "deep learning", "language model", "generative", "autonomous vehicle",
    "reinforcement learning", "transformer model", "diffusion model",
    "anthropic", "openai", "google deepmind", "nvidia ai", "nvidia cuda",
    "hugging face",
]

classifier_prompt = """
Is the following content specifically about artificial intelligence, machine learning, robotics, or LLMs? Answer YES only if the primary topic is AI/ML/robotics technology.

Answer NO for: travel, lifestyle, product sales, referral programs, real estate, finance, sports, gaming, cloud gaming, advertisements, promotional emails, merchandise listings, gift guides, product catalogs, sponsored content, politics, elections, campaigns, live streams/videos not primarily about AI/ML/robotics, or any tech topic not primarily about AI/ML/robotics.

Example:
Title: 'Live video with Prof G Media now: Can Dems Take the Senate?'
→ {"relevant": false}

Answer with a JSON object: {"relevant": true} or {"relevant": false}.
"""

[[topics]]
name = "robotics"
display_name = "Robotics"
feed_category = "Robotics"
output_dir = "Robotics"
file_prefix = "robotics-radar"
fail_open = false

# Intentionally empty — Robotics always runs the LLM classifier (matches
# pre-extraction behavior; keyword substring matching caused too many false
# passes for this topic).
keywords = []

classifier_prompt = """
You are a strict robotics content filter. Your job is to decide if an article belongs in a robotics digest. When in doubt, answer NO.

Answer YES only if the article's PRIMARY topic is one of:
  - Physical robots (humanoids, arms, mobile robots, cobots)
  - Drones / UAVs / UAS
  - Robot hardware, actuators, sensors, end-effectors
  - Industrial automation with physical machinery
  - Robot operating systems (ROS/ROS2) and robot-specific software
  - Autonomous vehicles (self-driving cars, AGVs)
  - Embodied AI where a physical robot is the subject
  - Robotics research (manipulation, navigation, HRI, SLAM)

Answer NO for ALL of the following — even if they mention robots in passing:
  - LLMs, chatbots, language models, text/image/audio AI
  - AI assistants (ChatGPT, Claude, Gemini, Copilot)
  - Reinforcement learning research with no physical robot
  - AI policy, regulation, ethics, copyright, deepfakes
  - Data science, MLOps, model training, quantization, inference
  - AI in education, healthcare, finance, or business strategy
  - Newsletter digests about general AI news
  - Cloud computing, APIs, developer tools (unless robot-specific)

Examples:
Title: 'Video Friday: Watch This Running Robot Not Fall Down Stairs'
→ {"relevant": true}

Title: 'AGIBOT Challenge Shifts Embodied AI to Physical Hardware at ICRA'
→ {"relevant": true}

Title: 'Tokenmaxxing might be dead'
→ {"relevant": false}

Title: 'Fix Your RL Environment Or Risk Bad Model Training'
→ {"relevant": false}

Title: 'Anthropic launches upgraded model for developers'
→ {"relevant": false}

Title: 'Schools Shift Views on Ban After ChatGPT Panic'
→ {"relevant": false}

Answer with JSON only: {"relevant": true} or {"relevant": false}.
"""
